<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a14"/>

  <!-- Glow -->
  <rect width="64" height="64" rx="14" fill="url(#glow)" opacity="0.4"/>

  <!-- Note page -->
  <rect x="14" y="10" width="28" height="36" rx="4" fill="#1a1a2e" stroke="#6c47ff" stroke-width="1.5"/>

  <!-- Lines on note -->
  <line x1="19" y1="20" x2="36" y2="20" stroke="#6c47ff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="19" y1="26" x2="36" y2="26" stroke="#6c47ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="19" y1="32" x2="30" y2="32" stroke="#6c47ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Pencil -->
  <g transform="rotate(-45, 44, 44)">
    <rect x="39" y="34" width="10" height="6" rx="1" fill="#a78bfa"/>
    <polygon points="39,34 49,34 49,40 39,40" fill="#a78bfa"/>
    <polygon points="39,40 49,40 44,46" fill="#6c47ff"/>
    <polygon points="41,44 47,44 44,48" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Sparkle dot -->
  <circle cx="46" cy="14" r="3" fill="#6c47ff" opacity="0.8"/>
  <circle cx="46" cy="14" r="1.5" fill="#a78bfa"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#6c47ff"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
