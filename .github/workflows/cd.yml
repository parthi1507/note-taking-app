name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build APK & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS servers
        id: build
        run: |
          BUILD_OUTPUT=$(eas build --platform android --profile preview --non-interactive --wait --json)
          echo "EAS build output: $BUILD_OUTPUT"
          BUILD_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].artifacts.buildUrl // empty')
          if [ -z "$BUILD_URL" ]; then
            echo "ERROR: Could not get build URL from EAS output"
            exit 1
          fi
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
        env:
          EXPO_PUBLIC_GROQ_API_KEY: ${{ secrets.EXPO_PUBLIC_GROQ_API_KEY }}
          NPM_CONFIG_LEGACY_PEER_DEPS: true

      - name: Download APK from EAS
        run: |
          mkdir -p ./build
          curl -L "${{ steps.build.outputs.build_url }}" -o ./build/notyx.apk
          echo "APK size: $(du -sh ./build/notyx.apk)"

      - name: Get version tag
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d')-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Notyx ${{ steps.version.outputs.tag }}"
          body: "Latest build from commit ${{ github.sha }}\n\n**Install:** Download and install `notyx.apk` on your Android device."
          files: ./build/notyx.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ota-update:
    name: EAS OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: eas update --auto --non-interactive --environment production --platform android
        env:
          EXPO_PUBLIC_GROQ_API_KEY: ${{ secrets.EXPO_PUBLIC_GROQ_API_KEY }}
          NPM_CONFIG_LEGACY_PEER_DEPS: true
